<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metronome</title>
</head>
<body>
    <button id="tap-btn"> TAP </button>

    <p id="bpm-paragraph"> </p>

    <button id="play-btn"> PLAY </button>

    <script>
        const tapButton = document.getElementById("tap-btn")
        const bpmParagraph = document.getElementById("bpm-paragraph")
        let lastTapTime, difference, intervalId

        const tapSound = new AudioContext()

        tapButton.addEventListener("click", function()  {

        const currentTapTime = Date.now()

        if(lastTapTime){
            difference = currentTapTime - lastTapTime
            console.log(difference)

            const bpm = Math.round(60000 / difference)
            bpmParagraph.textContent = bpm + " BPM"
            console.log(bpm)

        }
        
        lastTapTime = currentTapTime
    })

    const playButton = document.getElementById("play-btn")

    function playSound()
    {
        const oscillator = tapSound.createOscillator()
        oscillator.frequency.value = 440
        
        const volume = tapSound.createGain()
        volume.gain.value = 10

        const PlayTime = tapSound.currentTime
        volume.gain.exponentialRampToValueAtTime(0.001, PlayTime + 0.02)
        
        oscillator.start(PlayTime)
        oscillator.stop(PlayTime + 0.02)

        oscillator.connect(volume)
        volume.connect(tapSound.destination)
    }

    playButton.addEventListener("click", function()  {

        if(difference){
            if(intervalId){
                clearInterval(intervalId)
                intervalId = 0
            } else {
                intervalId = setInterval(playSound, difference) 
            }
        }

    })
    
    </script>
    
</body>
</html>
